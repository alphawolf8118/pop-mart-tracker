{% extends "base.html" %}
{% block content %}
<h1 class="text-4xl font-bold mb-8">Edit Figurine</h1>

<div class="max-w-2xl mx-auto bg-white p-8 rounded-lg shadow">
    <form method="POST">
        <div class="mb-6">
            <label class="block text-lg font-medium mb-2">Figurine Name</label>
            <input type="text" name="name" value="{{ fig.name }}" required 
                   class="border p-3 w-full rounded">
        </div>
        
        <div class="mb-6">
            <label class="block text-lg font-medium mb-2">Image URL</label>
            <input type="url" name="image_url" value="{{ fig.image_url }}" required 
                   class="border p-3 w-full rounded">
        </div>
        
        <div class="mb-6">
            <p class="text-gray-600">Current preview:</p>
            <img src="{{ fig.image_url }}" alt="Current" class="w-64 mx-auto rounded shadow mt-4">
        </div>
        
        <div class="flex gap-4">
            <button type="submit" class="bg-blue-600 text-white px-6 py-3 rounded hover:bg-blue-700">
                Save Changes
            </button>
            <a href="{{ url_for('view_collection', coll_id=collection_id) }}" 
               class="bg-gray-500 text-white px-6 py-3 rounded hover:bg-gray-600">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
