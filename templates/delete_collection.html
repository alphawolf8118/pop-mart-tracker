{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto bg-white p-10 rounded-lg shadow text-center">
    <h1 class="text-4xl font-bold text-red-600 mb-8">Delete Entire Collection?</h1>
    
    {% if collection.cover_image_url %}
    <img src="{{ collection.cover_image_url }}" alt="{{ collection.title }}" class="w-full max-w-md mx-auto rounded shadow mb-6">
    {% endif %}
    
    <h2 class="text-3xl font-semibold mb-4">{{ collection.title }}</h2>
    
    <p class="text-xl text-gray-700 mb-8">
        This will permanently delete the collection and <strong>all {{ figurines|length }} figurines</strong> in it.
        <br><span class="text-red-600 font-bold">Cannot be undone!</span>
    </p>
    
    <form method="POST" class="inline">
        <button type="submit" class="bg-red-600 text-white px-10 py-4 rounded-lg hover:bg-red-700 text-xl font-semibold">
            Yes, Delete Everything
        </button>
    </form>
    
    <a href="{{ url_for('index') }}" class="inline-block ml-6 bg-gray-500 text-white px-10 py-4 rounded-lg hover:bg-gray-600 text-xl font-semibold">
        Cancel
    </a>
</div>
{% endblock %}
