{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto bg-white p-8 rounded-lg shadow text-center">
    <h1 class="text-3xl font-bold text-red-600 mb-6">Delete Figurine?</h1>
    
    <div class="mb-8">
        <img src="{{ fig.image_url }}" alt="{{ fig.name }}" class="w-64 mx-auto rounded shadow mb-4">
        <h2 class="text-2xl font-semibold">{{ fig.name }}</h2>
        {% if fig.owned_count > 0 %}
        <p class="text-gray-600 mt-2">Owned: {{ fig.owned_count }} (will be removed)</p>
        {% endif %}
    </div>
    
    <p class="text-lg mb-8">This action cannot be undone.</p>
    
    <form method="POST" class="inline">
        <button type="submit" class="bg-red-600 text-white px-8 py-3 rounded hover:bg-red-700 text-lg">
            Yes, Delete Permanently
        </button>
    </form>
    
    <a href="{{ url_for('view_collection', coll_id=collection_id) }}" 
       class="inline-block ml-4 bg-gray-500 text-white px-8 py-3 rounded hover:bg-gray-600 text-lg">
        Cancel
    </a>
</div>
{% endblock %}
