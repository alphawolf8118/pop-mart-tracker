{% extends "base.html" %}
{% block content %}
<h1 class="text-3xl font-bold mb-8">Edit Collection</h1>

<form method="POST" enctype="multipart/form-data" class="bg-white p-6 rounded shadow max-w-2xl mx-auto">
    <div class="mb-6">
        <label class="block text-lg font-medium mb-2">Collection Title</label>
        <input type="text" name="title" value="{{ collection.title }}" required class="border p-3 w-full rounded">
    </div>

    {% if collection.cover_image_url %}
    <div class="mb-6">
        <p class="text-lg font-medium mb-2">Current Cover:</p>
        <img src="{{ collection.cover_image_url }}" class="w-full max-w-md rounded shadow">
    </div>
    {% endif %}
    
    <div class="mb-6">
        <label class="block text-lg font-medium mb-2">Cover Image Upload (Optional)</label>
        <input type="file" name="cover_image" accept="image/*" 
            class="border p-3 w-full rounded file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:bg-blue-600 file:text-white hover:file:bg-blue-700">
        <p class="text-sm text-gray-600 mt-2">Upload your own snipped poster – overrides URL below</p>
    </div>

    <div class="mb-6">
        <label class="block text-lg font-medium mb-2">Or Cover Image URL (Optional)</label>
        <input type="url" name="cover_image_url" placeholder="https://example.com/poster.jpg" 
            value="{{ collection.cover_image_url if collection and collection.cover_image_url and collection.cover_image_url.startswith('http') else '' }}" 
            class="border p-3 w-full rounded">
        <p class="text-sm text-gray-600 mt-2">Paste a direct link – only used if no file uploaded</p>
    </div>
    
    <div class="mb-6">
        <label class="block text-lg font-medium mb-2">Price per Blind Box (USD)</label>
        <input type="number" step="0.01" name="price_per_box" 
            value="{{ collection.price_per_box or 19.99 }}" 
            class="border p-3 w-full rounded">
    </div>
    <div class="flex gap-4">
        <button type="submit" class="bg-blue-600 text-white px-6 py-3 rounded">Save</button>
        <a href="{{ url_for('index') }}" class="bg-gray-500 text-white px-6 py-3 rounded">Cancel</a>
    </div>
</form>
{% endblock %}
